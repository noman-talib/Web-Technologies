<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacBook M5 - The Best You Can Have</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="mid.css">
</head>
<body>
    <div id="grid-container">
        <header id="hdr">
            <h1 class="mb-2">MacBook M5</h1>
            <p class="lead">The Best You Can Have</p>
            <img src="img.jpg" alt="MacBook M5" class="img-fluid">
        </header>

        <aside id="sidebar-left" class="sidebar">
            <h3>Features</h3>
            <ul>
                <li>M5 Chip</li>
                <li>16GB RAM</li>
                <li>512GB SSD</li>
                <li>Retina Display</li>
                <li>All-Day Battery</li>
            </ul>
        </aside>

        <main id="form-section">
            <div id="form">
                <h2 class="mb-4">Enter Your Details</h2>
                <form action="#">
                    <div class="mb-3">
                        <label for="inputtext" class="form-label">Name</label>
                        <input type="text" class="form-control" placeholder="Enter your name" id="inputtext" required>
                    </div>
                    <div class="mb-3">
                        <label for="inputemail" class="form-label">Email</label>
                        <input type="email" class="form-control" placeholder="Enter your email" id="inputemail" required>
                    </div>
                    <div class="mb-3">
                        <label for="inputmessage" class="form-label">Message</label>
                        <textarea class="form-control" placeholder="Enter your message" id="inputmessage" rows="4" required></textarea>
                    </div>
                    <button type="submit" id="sbt" class="btn btn-primary w-100">Submit</button>
                </form>
            </div>
        </main>

        <aside id="sidebar-right" class="sidebar">
            <h3>Specifications</h3>
            <ul>
                <li><strong>Processor:</strong> M5 Chip</li>
                <li><strong>Memory:</strong> 16GB</li>
                <li><strong>Storage:</strong> 512GB SSD</li>
            </ul>
        </aside>

        <footer id="footer">
            <p class="mb-2">&copy; 2026 MacBook Store. All rights reserved.</p>
            <div class="footer-icons">
                <a href="#" class="me-3"><i class="bi bi-facebook"></i></a>
                <a href="#" class="me-3"><i class="bi bi-twitter"></i></a>
                <a href="#" class="me-3"><i class="bi bi-linkedin"></i></a>
                <a href="#"><i class="bi bi-envelope"></i></a>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

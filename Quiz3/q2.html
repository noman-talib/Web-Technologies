<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jquery Question 2</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function () {
            $("#hidebtn").click(function () {
                $("#text").hide();
            });
        });
    </script>
</head>

<body>
    <p id="text">Hello! My name is Noman and I am a Student of Software Engineering Studying in COMSATS University
        Sahiwal, Islamabad Campus</p>
    <button id="hidebtn">Click to Hide text</button>


</body>

</html>

<!DOCTYPE html>
<html>
<head>
    <title>Question Checker</title>
</head>
<body>

<script>
function askQuestion() {
    let answer = prompt("What is 5 + 5?");

    if (answer == "10") {
        alert("Correct Answer! ✅");
    } else {
        alert("Wrong Answer ❌");
    }
}

// call function
askQuestion();
</script>

</body>
</html>

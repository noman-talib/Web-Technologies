<!DOCTYPE html>
<html>
<body>

<h3>Simple Question Game</h3>

<button onclick="askQuestion()">Try it</button>

<script>
function askQuestion() {
  var answer = prompt("What is 2 + 2?");
  
  if (answer == "4") {
    alert("Correct! 🎉");
  } else {
    alert("Wrong answer ❌");
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Web Template Using Tables & Forms</title>
</head>

<body bgcolor="#f2f2f2">

<!-- Main Layout Table -->
<table width="900" align="center" border="0" cellpadding="10" cellspacing="0" bgcolor="white">

    <!-- Header -->
    <tr bgcolor="#003366">
        <td colspan="2" align="center">
            <font color="white" size="6"><b>COMSATS Registration Portal</b></font>
        </td>
    </tr>

    <!-- Navigation -->
    <tr bgcolor="#e6e6e6">
        <td colspan="2" align="center">
            <a href="#" style="text-decoration:none; font-weight:bold;">Home</a> |
            <a href="#" style="text-decoration:none; font-weight:bold;">About</a> |
            <a href="#" style="text-decoration:none; font-weight:bold;">Programs</a> |
            <a href="#" style="text-decoration:none; font-weight:bold;">Contact</a>
        </td>
    </tr>

    <!-- Left Sidebar -->
    <tr>
        <td width="30%" valign="top" bgcolor="#d9edf7">

            <h3>Connect With Us</h3>

            <ul>
                <li><a href="https://www.facebook.com" target="_blank">Facebook</a></li>
                <li><a href="https://www.twitter.com" target="_blank">Twitter</a></li>
                <li><a href="#">Terms & Conditions</a></li>
            </ul>

        </td>

        <!-- Main Content (Form Section) -->
        <td width="70%" valign="top">

            <h2 align="center">Student Registration Form</h2>

            <form>

                <table width="100%" cellpadding="8" cellspacing="0" border="1" bordercolor="#cccccc">

                    <tr bgcolor="#003366">
                        <td colspan="2" align="center">
                            <font color="white"><b>Personal Information</b></font>
                        </td>
                    </tr>

                    <tr>
                        <td bgcolor="#f9f9f9"><b>Full Name</b></td>
                        <td><input type="text" name="name" size="30" style="background-color:#ffffcc;"></td>
                    </tr>

                    <tr>
                        <td bgcolor="#f9f9f9"><b>Email</b></td>
                        <td><input type="email" name="email" size="30" style="background-color:#e6f7ff;"></td>
                    </tr>

                    <tr>
                        <td bgcolor="#f9f9f9"><b>Password</b></td>
                        <td><input type="password" name="password" size="30" style="background-color:#ffe6e6;"></td>
                    </tr>

                    <tr>
                        <td bgcolor="#f9f9f9"><b>Gender</b></td>
                        <td>
                            <input type="radio" name="gender"> Male
                            <input type="radio" name="gender"> Female
                        </td>
                    </tr>

                    <tr>
                        <td bgcolor="#f9f9f9"><b>Program</b></td>
                        <td>
                            <select style="background-color:#e6ffe6;">
                                <option>BS Software Engineering</option>
                                <option>BS Computer Science</option>
                                <option>BBA</option>
                                <option>MS Computer Science</option>
                            </select>
                        </td>
                    </tr>

                    <tr>
                        <td bgcolor="#f9f9f9"><b>Address</b></td>
                        <td>
                            <textarea rows="4" cols="30" style="background-color:#f0e6ff;"></textarea>
                        </td>
                    </tr>

                    <tr align="center">
                        <td colspan="2">
                            <input type="submit" value="Submit" 
                                   style="background-color:#003366; color:white; padding:5px 15px;">
                            <input type="reset" value="Reset" 
                                   style="background-color:gray; color:white; padding:5px 15px;">
                        </td>
                    </tr>

                </table>

            </form>

        </td>
    </tr>

    <!-- Footer -->
    <tr bgcolor="#003366">
        <td colspan="2" align="center">
            <font color="white">
                © 2026 COMSATS University | All Rights Reserved
            </font>
        </td>
    </tr>

</table>

</body>
</html>

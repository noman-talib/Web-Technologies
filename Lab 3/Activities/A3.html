<!DOCTYPE html>
<html>
<head>
    <title>Semantic Layout Example</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

    <header>
        <h1>Heading</h1>
    </header>

    <section>

        <main>
            <article>
                <p>This is the main content of the website.</p>
            </article>
        </main>

        <aside>
            <p>Extra information.</p>
        </aside>

    </section>

    <footer>
        <p>Copyright 2024</p>
    </footer>

</body>
</html>

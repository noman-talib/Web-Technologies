<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>Lab Task 1</title>
</head>
<body>

<h2>Lab Task 1</h2>
<p><i>Design the web template given below using tables and external CSS</i></p>

<!-- Outer Table -->
<table class="outer">
    <tr>
        <td>

            <!-- Inner Dark Area -->
            <table class="inner">
                
                <!-- Login Form -->
                <tr>
                    <td align="center">
                        <table class="form-box">
                            <tr><th colspan="2">Member Login</th></tr>
                            <tr>
                                <td>Username</td>
                                <td><input type="text"></td>
                            </tr>
                            <tr>
                                <td>Password</td>
                                <td><input type="password"></td>
                            </tr>
                            <tr>
                                <td colspan="2" align="center">
                                    <button>Login</button>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>

                <!-- Signup Form -->
                <tr>
                    <td align="center">
                        <table class="form-box large">
                            <tr><th colspan="2">Sign Up</th></tr>
                            <tr>
                                <td>Username</td>
                                <td><input type="text"></td>
                            </tr>
                            <tr>
                                <td>Email</td>
                                <td><input type="text"></td>
                            </tr>
                            <tr>
                                <td>Password</td>
                                <td><input type="password"></td>
                            </tr>
                            <tr>
                                <td>City</td>
                                <td><input type="text"></td>
                            </tr>
                            <tr>
                                <td>Country</td>
                                <td><input type="text"></td>
                            </tr>
                            <tr>
                                <td colspan="2" align="center">
                                    <button>Sign Up</button>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Input Validation Form</title>
    <script>
        function validateForm(event) {
            event.preventDefault(); // stop form submission

            let userInput = document.getElementById("code").value;

            // Regular expression for required pattern
            let pattern = /^[1-4][A-Z]{2}[0-9]{2}[A-Z]{2}[0-9]{3}$/;

            if (userInput.length === 0) {
                alert("Error: Input cannot be empty!");
                return false;
            }

            if (userInput.includes(" ")) {
                alert("Error: Spaces are not allowed!");
                return false;
            }

            if (!pattern.test(userInput)) {
                alert("Error: Invalid format!\n\nRequired format:\nDigit (1-4) + 2 uppercase letters + 2 digits + 2 uppercase letters + 3 digits\nExample: 3AB12CD345");
                return false;
            }

            alert("Success: Valid input!");
            return true;
        }
    </script>
</head>

<body>
    <h2>Enter Code</h2>

    <form onsubmit="validateForm(event)">
        <label>Enter Code:</label>
        <input type="text" id="code" required>
        <br><br>
        <input type="submit" value="Submit">
    </form>

</body>
</html>

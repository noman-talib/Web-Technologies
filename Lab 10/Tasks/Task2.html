<!DOCTYPE html>
<html>
<head>
    <title>AJAX Posts with Search</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        h2 {
            margin-bottom: 20px;
        }

        #search {
            width: 300px;
            padding: 8px;
            margin-bottom: 20px;
        }

        .post {
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .post h3 {
            margin: 0 0 10px;
        }
    </style>
</head>
<body>

<h2>Posts List</h2>

<!-- Search Bar -->
<input type="text" id="search" placeholder="Search by title...">

<!-- Posts Container -->
<div id="posts"></div>

<script>
$(document).ready(function () {

    let allPosts = [];

    // Fetch posts using AJAX
    $.ajax({
        url: "https://jsonplaceholder.typicode.com/posts",
        type: "GET",

        success: function (data) {

            allPosts = data;

            displayPosts(allPosts);
        },

        error: function () {
            $("#posts").html("<p>Failed to load posts.</p>");
        }
    });

    // Function to display posts
    function displayPosts(posts) {

        $("#posts").empty();

        if (posts.length === 0) {
            $("#posts").html("<p>No posts found.</p>");
            return;
        }

        $.each(posts, function (index, post) {

            $("#posts").append(`
                <div class="post">
                    <h3>${post.title}</h3>
                    <p>${post.body}</p>
                </div>
            `);

        });
    }

    // Search filter using jQuery
    $("#search").on("keyup", function () {

        let searchText = $(this).val().toLowerCase();

        let filteredPosts = allPosts.filter(function (post) {

            return post.title.toLowerCase().includes(searchText);

        });

        displayPosts(filteredPosts);
    });

});
</script>

</body>
</html>
